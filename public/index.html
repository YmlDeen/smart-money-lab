<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money Lab – MTF Core</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ✅ Stable CDN -->
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
:root {
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.12);
  --glow-green: #00ffcc;
  --glow-gold: #ffaa00;
  --glow-blue: #00aaff;
  --bg-deep: #050810;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg-deep);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  padding:16px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  margin-bottom:14px;
  border-radius:18px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(16px);
}

.logo{
  font-family:'Orbitron',monospace;
  font-weight:900;
  letter-spacing:2px;
  font-size:1rem;
  background:linear-gradient(135deg,var(--glow-green),var(--glow-blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.badge{
  font-family:'Orbitron',monospace;
  font-size:.65rem;
  letter-spacing:2px;
  color:var(--glow-green);
}

.tf-row{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.tf-btn{
  font-family:'Orbitron',monospace;
  font-size:.75rem;
  padding:8px 18px;
  border-radius:10px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:#aaa;
  cursor:pointer;
  transition:.25s;
}

.tf-btn.active{
  background:var(--glow-green);
  color:#000;
  font-weight:700;
}

#chartContainer{
  width:100%;
  height:480px;
  border-radius:16px;
  margin-bottom:12px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.btn{
  font-family:'Orbitron',monospace;
  font-size:.7rem;
  padding:8px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.play{background:#00ffcc;color:#000}
.pause{background:#ffaa00;color:#000}
.step{background:#00aaff;color:#fff}
.speed{background:#222;color:#fff}
.speed.active{background:#ffaa00;color:#000}

.status{
  margin-top:10px;
  font-family:'Orbitron',monospace;
  font-size:.75rem;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SmartMoneyLab</div>
  <div class="badge">REPLAY MODE</div>
</div>

<div class="tf-row">
  <button class="tf-btn" id="btnD1" onclick="switchTF('D1')">D1</button>
  <button class="tf-btn" id="btnH4" onclick="switchTF('H4')">H4</button>
  <button class="tf-btn active" id="btnH1" onclick="switchTF('H1')">H1</button>
</div>

<div id="chartContainer"></div>

<div class="controls">
  <button class="btn step" onclick="step()">STEP</button>
  <button class="btn play" onclick="play()">PLAY</button>
  <button class="btn pause" onclick="pause()">PAUSE</button>

  <button class="btn speed active" onclick="setSpeed(1,this)">×1</button>
  <button class="btn speed" onclick="setSpeed(2,this)">×2</button>
  <button class="btn speed" onclick="setSpeed(4,this)">×4</button>
</div>

<div class="status">
  TF: <span id="statTF">H1</span> |
  Candle: <span id="statBar">--</span> |
  Speed: <span id="statSpeed">×1</span>
</div>

<script>
// SAFETY CHECK
if(typeof LightweightCharts === 'undefined'){
  alert("Chart library failed to load");
  throw new Error("LightweightCharts not loaded");
}

// ───── Synthetic Gold Data ─────
function generateH1(bars){
  const data=[];
  let ts=Math.floor(Date.now()/1000)-bars*3600;
  let price=1900+Math.random()*200;

  for(let i=0;i<bars;i++){
    const d=new Date(ts*1000);
    const day=d.getUTCDay();
    if(day===0||day===6){ts+=3600;i--;continue;}

    const drift=0.02;
    const vol=price*0.003;
    const change=(Math.random()-0.5)*vol+drift;

    const open=price;
    const close=price+change;
    const high=Math.max(open,close)+Math.random()*vol*0.6;
    const low=Math.min(open,close)-Math.random()*vol*0.6;

    data.push({
      time:ts,
      open:+open.toFixed(2),
      high:+high.toFixed(2),
      low:+low.toFixed(2),
      close:+close.toFixed(2)
    });

    price=close;
    ts+=3600;
  }
  return data;
}

function aggregate(data,group){
  const result=[];
  for(let i=0;i<data.length;i+=group){
    const slice=data.slice(i,i+group);
    if(slice.length<group)break;
    result.push({
      time:slice[0].time,
      open:slice[0].open,
      high:Math.max(...slice.map(x=>x.high)),
      low:Math.min(...slice.map(x=>x.low)),
      close:slice[slice.length-1].close
    });
  }
  return result;
}

let speed=1,interval=null;

const H1=generateH1(600);
const H4=aggregate(H1,4);
const D1=aggregate(H1,24);

const state={
  currentTF:"H1",
  data:{H1,H4,D1},
  replayIndex:{H1:80,H4:30,D1:15}
};

// ───── Chart Init ─────
const chart=LightweightCharts.createChart(
  document.getElementById('chartContainer'),
  {
    layout:{background:{color:'transparent'},textColor:'#aaa'},
    grid:{vertLines:{color:'rgba(255,255,255,.04)'},horzLines:{color:'rgba(255,255,255,.04)'}},
    rightPriceScale:{borderColor:'rgba(255,255,255,.08)'},
    timeScale:{borderColor:'rgba(255,255,255,.08)'}
  }
);

const series=chart.addCandlestickSeries({
  upColor:'#00ffcc',
  downColor:'#ff4466',
  borderUpColor:'#00ffcc',
  borderDownColor:'#ff4466',
  wickUpColor:'#00ffcc',
  wickDownColor:'#ff4466'
});

function updateStatus(){
  const tf=state.currentTF;
  document.getElementById('statTF').textContent=tf;
  document.getElementById('statBar').textContent=
    state.replayIndex[tf]+" / "+state.data[tf].length;
  document.getElementById('statSpeed').textContent="×"+speed;
}

function render(){
  const tf=state.currentTF;
  const idx=state.replayIndex[tf];
  series.setData(state.data[tf].slice(0,idx));
  chart.timeScale().fitContent();
  updateStatus();
}

function step(){
  const tf=state.currentTF;
  if(state.replayIndex[tf]<state.data[tf].length){
    const d=state.data[tf][state.replayIndex[tf]];
    series.update(d);
    state.replayIndex[tf]++;
    updateStatus();
  }
}

function play(){
  if(interval)return;
  interval=setInterval(()=>{
    const tf=state.currentTF;
    for(let i=0;i<speed;i++){
      if(state.replayIndex[tf]<state.data[tf].length){
        series.update(state.data[tf][state.replayIndex[tf]]);
        state.replayIndex[tf]++;
      }
    }
    updateStatus();
  },500);
}

function pause(){
  clearInterval(interval);
  interval=null;
}

function setSpeed(s,el){
  speed=s;
  document.querySelectorAll('.speed').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateStatus();
}

function switchTF(tf){
  pause();
  state.currentTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn'+tf).classList.add('active');
  render();
}

render();
</script>

</body>
</html>

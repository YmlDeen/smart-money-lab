<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money Replay</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
padding:15px;
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}
button{
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin-left:5px;
}
.primary{background:#00ffcc;color:#111;}
.secondary{background:#ffaa00;color:#111;}
.danger{background:#ff4d88;color:white;}
.speed{background:#ffffff22;color:white;}

#chartContainer{
position:relative;
height:500px;
}
#chart{
height:100%;
}
#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.controls{
margin-top:15px;
text-align:center;
}
</style>
</head>
<body>

<div class="topbar glass">
<div><b>Smart Money Replay</b></div>
<div>
<button class="speed" onclick="setSpeed(1)">x1</button>
<button class="speed" onclick="setSpeed(2)">x2</button>
<button class="speed" onclick="setSpeed(4)">x4</button>
<button class="secondary" onclick="toggleDraw()">Draw Zone</button>
<button class="danger" onclick="deleteZone()">Delete Zone</button>
</div>
</div>

<div class="glass">
<div id="chartContainer">
<div id="chart"></div>
<canvas id="overlay"></canvas>
</div>

<div class="controls">
<button class="primary" onclick="step()">Step</button>
<button class="primary" onclick="play()">Play</button>
<button class="secondary" onclick="pause()">Pause</button>
</div>
</div>

<script>

let fullData=[];
let currentIndex=50;
let interval=null;
let speed=1;

let chart;
let candleSeries;
let overlay=document.getElementById("overlay");
let ctx=overlay.getContext("2d");

let drawing=false;
let zone=null;
let sl=null;
let startY=null;

async function loadData(){
let res=await fetch('/api/gold-history-h1');
let data=await res.json();
fullData=data.map(d=>({
time:Math.floor(new Date(d.time).getTime()/1000),
open:d.open,high:d.high,low:d.low,close:d.close
}));
}

function initChart(){
chart=LightweightCharts.createChart(
document.getElementById('chart'),
{
layout:{background:{color:'transparent'},textColor:'#fff'},
grid:{vertLines:{color:'rgba(255,255,255,0.05)'},horzLines:{color:'rgba(255,255,255,0.05)'}},
rightPriceScale:{borderColor:'rgba(255,255,255,0.2)'},
timeScale:{borderColor:'rgba(255,255,255,0.2)'}
}
);
candleSeries=chart.addCandlestickSeries();
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
}

function resizeCanvas(){
overlay.width=overlay.clientWidth;
overlay.height=overlay.clientHeight;
drawOverlay();
}

function render(){
candleSeries.setData(fullData.slice(0,currentIndex));
}

function step(){
if(currentIndex<fullData.length){
currentIndex++;
render();
}
}
function play(){
if(interval)return;
interval=setInterval(()=>{
for(let i=0;i<speed;i++){
if(currentIndex<fullData.length)currentIndex++;
}
render();
},500);
}
function pause(){
clearInterval(interval);
interval=null;
}
function setSpeed(s){speed=s;}

function toggleDraw(){
drawing=!drawing;
overlay.style.pointerEvents=drawing?"auto":"none";
}

function deleteZone(){
zone=null;
drawOverlay();
}

overlay.addEventListener("mousedown",(e)=>{
if(!drawing)return;
startY=e.offsetY;
});

overlay.addEventListener("mouseup",(e)=>{
if(!drawing)return;
let endY=e.offsetY;
let top=Math.min(startY,endY);
let bottom=Math.max(startY,endY);
zone={
top,bottom,
type:startY> endY?"supply":"demand"
};
drawing=false;
overlay.style.pointerEvents="none";
drawOverlay();
});

overlay.addEventListener("dblclick",(e)=>{
sl={y:e.offsetY};
drawOverlay();
});

function drawOverlay(){
ctx.clearRect(0,0,overlay.width,overlay.height);

if(zone){
ctx.fillStyle=zone.type==="supply"?"rgba(255,0,0,0.3)":"rgba(0,255,0,0.3)";
ctx.fillRect(0,zone.top,overlay.width,zone.bottom-zone.top);
}

if(sl){
ctx.strokeStyle="#ffcc00";
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(0,sl.y);
ctx.lineTo(overlay.width,sl.y);
ctx.stroke();
}
}

(async function(){
await loadData();
initChart();
render();
})();

</script>
</body>
</html>

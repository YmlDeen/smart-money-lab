<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money Replay</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#111;
color:white;
font-family:Arial, sans-serif;
padding:15px;
}

#chartContainer{
width:100%;
height:500px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{background:#00ffcc;color:#000;}
.secondary{background:#ffaa00;color:#000;}
.speed{background:#333;color:white;}

.controls{
margin-top:10px;
}
</style>
</head>

<body>

<h2>Smart Money Replay</h2>

<div id="chartContainer"></div>

<div class="controls">
<button class="primary" onclick="step()">Step</button>
<button class="primary" onclick="play()">Play</button>
<button class="secondary" onclick="pause()">Pause</button>
<br>
<button class="speed" onclick="setSpeed(1)">x1</button>
<button class="speed" onclick="setSpeed(2)">x2</button>
<button class="speed" onclick="setSpeed(4)">x4</button>
</div>

<script>

let fullData = [];
let currentIndex = 50;
let interval = null;
let speed = 1;

let chart;
let candleSeries;

async function loadData(){
try{
const res = await fetch('/api/gold-history-h1');
const data = await res.json();

fullData = data.map(d=>({
time: Math.floor(new Date(d.time).getTime()/1000),
open: d.open,
high: d.high,
low: d.low,
close: d.close
}));

}catch(e){
console.log("API failed");
}
}

function initChart(){
const container = document.getElementById('chartContainer');

chart = LightweightCharts.createChart(container, {
width: container.clientWidth,
height: container.clientHeight,
layout:{
background:{color:'#111'},
textColor:'#fff'
},
grid:{
vertLines:{color:'#222'},
horzLines:{color:'#222'}
}
});

candleSeries = chart.addCandlestickSeries();

window.addEventListener('resize', ()=>{
chart.applyOptions({
width: container.clientWidth,
height: container.clientHeight
});
});
}

function render(){
candleSeries.setData(fullData.slice(0,currentIndex));
}

function step(){
if(currentIndex < fullData.length){
currentIndex++;
render();
}
}

function play(){
if(interval) return;

interval = setInterval(()=>{
for(let i=0;i<speed;i++){
if(currentIndex < fullData.length){
currentIndex++;
}
}
render();
},500);
}

function pause(){
clearInterval(interval);
interval = null;
}

function setSpeed(s){
speed = s;
}

(async function(){
await loadData();
initChart();
render();
})();
</script>

</body>
</html>
